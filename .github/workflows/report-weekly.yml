name: Weekly Trading Report

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 00:00 UTC (日本時間 09:00)
  workflow_dispatch:
    inputs:
      week_offset:
        description: 'Week offset (0 = last week, 1 = two weeks ago)'
        required: false
        default: '0'
        type: string

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env
        run: |
          echo "SAXO_ACCESS_TOKEN=${{ secrets.SAXO_ACCESS_TOKEN }}" >> .env
          echo "SAXO_BASE_URL=https://gateway.saxobank.com/sim/openapi" >> .env
          echo "DISCORD_REPORT_WEBHOOK_URL=${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}" >> .env

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl bc

      - name: Generate Weekly Report
        env:
          SAXO_ACCESS_TOKEN: ${{ secrets.SAXO_ACCESS_TOKEN }}
          SAXO_BASE_URL: https://gateway.saxobank.com/sim/openapi
          DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
          WEEK_OFFSET: ${{ github.event.inputs.week_offset || '0' }}
        run: |
          chmod +x scripts/**/*.sh

          echo "Running weekly report..."
          ./scripts/report/weekly-report.sh

      - name: Summary
        if: always()
        run: |
          echo "Weekly report completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
