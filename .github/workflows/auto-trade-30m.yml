name: Auto Trade (30m)

on:
  schedule:
    - cron: '0,30 * * * *'  # 0分と30分 (UTC)
  workflow_dispatch:
    inputs:
      currency:
        description: '通貨ペア (空欄で全通貨)'
        required: false
        type: choice
        options:
          - ''
          - USDJPY
          - EURUSD
          - GBPUSD
          - GBPJPY
          - EURJPY
          - AUDUSD
          - XAUUSD
          - XAGUSD

permissions:
  contents: write

jobs:
  trade:
    uses: ./.github/workflows/_trade-job.yml
    with:
      currencies: ${{ github.event.inputs.currency != '' && format('["{0}"]', github.event.inputs.currency) || '["USDJPY", "EURUSD", "GBPUSD", "GBPJPY", "EURJPY", "AUDUSD", "XAUUSD", "XAGUSD"]' }}
      primary_timeframe: '15m'
      secondary_timeframe: '1h'
      primary_range: '5d'
      secondary_range: '10d'
    secrets:
      SAXO_ACCESS_TOKEN: ${{ secrets.SAXO_ACCESS_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DISCORD_ENTRY_WEBHOOK_URL: ${{ secrets.DISCORD_ENTRY_WEBHOOK_URL }}
