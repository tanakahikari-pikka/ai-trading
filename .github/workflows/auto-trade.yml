name: Auto Trade

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分 (UTC)
  workflow_dispatch:
    inputs:
      currency:
        description: '通貨ペア (空欄で全通貨)'
        required: false
        type: choice
        options:
          - ''
          - USDJPY
          - EURUSD
          - GBPUSD
          - EURJPY
          - XAUUSD

jobs:
  trade:
    runs-on: ubuntu-latest
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        currency: ${{ github.event.inputs.currency != '' && fromJSON(format('["{0}"]', github.event.inputs.currency)) || fromJSON('["USDJPY", "EURUSD", "GBPUSD", "EURJPY", "XAUUSD"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env
        run: |
          echo "SAXO_ACCESS_TOKEN=${{ secrets.SAXO_ACCESS_TOKEN }}" >> .env
          echo "SAXO_BASE_URL=https://gateway.saxobank.com/sim/openapi" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl bc

      - name: Run Auto Trade (${{ matrix.currency }})
        env:
          SAXO_ACCESS_TOKEN: ${{ secrets.SAXO_ACCESS_TOKEN }}
          SAXO_BASE_URL: https://gateway.saxobank.com/sim/openapi
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          chmod +x scripts/*.sh scripts/**/*.sh
          ./scripts/auto-trade.sh ${{ matrix.currency }}

      - name: Summary
        if: always()
        run: |
          echo "Auto trade (${{ matrix.currency }}) completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
