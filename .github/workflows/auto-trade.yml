name: Auto Trade USD/JPY

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分 (UTC)
  workflow_dispatch:      # 手動実行

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env
        run: |
          echo "SAXO_ACCESS_TOKEN=${{ secrets.SAXO_ACCESS_TOKEN }}" >> .env
          echo "SAXO_BASE_URL=https://gateway.saxobank.com/sim/openapi" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Run Auto Trade
        run: |
          chmod +x scripts/*.sh scripts/**/*.sh
          ./scripts/auto-trade.sh

      - name: Summary
        if: always()
        run: |
          echo "Auto trade workflow completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
