name: Trade Job (Reusable)

on:
  workflow_call:
    inputs:
      currencies:
        description: 'JSON array of currency pairs'
        required: true
        type: string
      primary_timeframe:
        description: 'Primary timeframe (e.g., 1h, 15m)'
        required: true
        type: string
      secondary_timeframe:
        description: 'Secondary timeframe for MTF filter (e.g., 4h, 1h)'
        required: true
        type: string
      primary_range:
        description: 'Data range for primary timeframe (e.g., 10d, 5d)'
        required: true
        type: string
      secondary_range:
        description: 'Data range for secondary timeframe (e.g., 30d, 10d)'
        required: true
        type: string
    secrets:
      SAXO_ACCESS_TOKEN:
        required: true
      OPENAI_API_KEY:
        required: true
      DISCORD_WEBHOOK_URL:
        required: true
      DISCORD_ENTRY_WEBHOOK_URL:
        required: true

jobs:
  trade:
    runs-on: ubuntu-latest
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        currency: ${{ fromJSON(inputs.currencies) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .env
        run: |
          echo "SAXO_ACCESS_TOKEN=${{ secrets.SAXO_ACCESS_TOKEN }}" >> .env
          echo "SAXO_BASE_URL=https://gateway.saxobank.com/sim/openapi" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl bc

      - name: Run Auto Trade (${{ matrix.currency }} @ ${{ inputs.primary_timeframe }})
        id: trade
        env:
          SAXO_ACCESS_TOKEN: ${{ secrets.SAXO_ACCESS_TOKEN }}
          SAXO_BASE_URL: https://gateway.saxobank.com/sim/openapi
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ENTRY_WEBHOOK_URL: ${{ secrets.DISCORD_ENTRY_WEBHOOK_URL }}
          PRIMARY_TIMEFRAME: ${{ inputs.primary_timeframe }}
          PRIMARY_RANGE: ${{ inputs.primary_range }}
          SECONDARY_TIMEFRAME: ${{ inputs.secondary_timeframe }}
          SECONDARY_RANGE: ${{ inputs.secondary_range }}
        run: |
          chmod +x scripts/*.sh scripts/**/*.sh

          # Run trade and capture result
          RESULT=$(./scripts/auto-trade.sh ${{ matrix.currency }})
          echo "$RESULT"

          # Extract decision
          DECISION=$(echo "$RESULT" | jq -r '.decision // "not_order"')
          echo "decision=$DECISION" >> $GITHUB_OUTPUT

          # Save result for logging
          echo "$RESULT" > /tmp/trade_result.json

      - name: Upload trade result
        if: steps.trade.outputs.decision == 'go'
        uses: actions/upload-artifact@v4
        with:
          name: trade-result-${{ matrix.currency }}-${{ inputs.primary_timeframe }}
          path: /tmp/trade_result.json
          retention-days: 1

      - name: Summary
        if: always()
        run: |
          echo "Auto trade (${{ matrix.currency }} @ ${{ inputs.primary_timeframe }}) completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Decision: ${{ steps.trade.outputs.decision }}"

  # Collect and commit logs after all trades complete
  commit-logs:
    needs: trade
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: trade-result-*
          merge-multiple: false

      - name: Process and commit logs
        run: |
          # Check if any artifacts exist
          if [ ! -d "artifacts" ] || [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "No trade results to log"
            exit 0
          fi

          mkdir -p logs/entries
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')
          DATE=$(date -u '+%Y-%m-%d')
          CSV_FILE="logs/entries.csv"
          MD_FILE="logs/entries/${DATE}.md"
          ENTRIES_ADDED=0

          # Create CSV header if needed
          if [ ! -f "$CSV_FILE" ]; then
            echo "timestamp,symbol,action,amount,entry_price,sl,tp,rsi,ai_confidence,trend_1h,trend_4h,ai_summary" > "$CSV_FILE"
          fi

          # Create MD header if needed
          if [ ! -f "$MD_FILE" ]; then
            echo "# Entry Log - ${DATE}" > "$MD_FILE"
            echo "" >> "$MD_FILE"
          fi

          # Process each trade result
          for dir in artifacts/trade-result-*/; do
            if [ -f "${dir}trade_result.json" ]; then
              RESULT=$(cat "${dir}trade_result.json")
              SYMBOL=$(echo "$RESULT" | jq -r '.symbol')
              ACTION=$(echo "$RESULT" | jq -r '.action')

              echo "Processing: $SYMBOL $ACTION"

              # Append to CSV
              echo "$RESULT" | jq -r --arg ts "$TIMESTAMP" '
                [$ts, .symbol, .action, (.amount | tostring),
                 (if .action == "Buy" then .price.ask else .price.bid end | tostring),
                 (.sl_tp.stop_loss // "N/A" | tostring),
                 (.sl_tp.take_profit // "N/A" | tostring),
                 (.analysis.rsi | tostring),
                 (.ai_analysis.confidence | tostring),
                 .analysis.trend_1h, .analysis.trend_4h,
                 .ai_analysis.summary] | @csv
              ' >> "$CSV_FILE"

              # Append to MD
              AMOUNT=$(echo "$RESULT" | jq -r '.amount')
              ENTRY_PRICE=$(echo "$RESULT" | jq -r 'if .action == "Buy" then .price.ask else .price.bid end')
              SL=$(echo "$RESULT" | jq -r '.sl_tp.stop_loss // "N/A"')
              TP=$(echo "$RESULT" | jq -r '.sl_tp.take_profit // "N/A"')
              RSI=$(echo "$RESULT" | jq -r '.analysis.rsi')
              RULE_SIGNAL=$(echo "$RESULT" | jq -r '.analysis.rule_signal')
              AI_CONFIDENCE=$(echo "$RESULT" | jq -r '.ai_analysis.confidence')
              AI_SUMMARY=$(echo "$RESULT" | jq -r '.ai_analysis.summary')
              TREND_1H=$(echo "$RESULT" | jq -r '.analysis.trend_1h')
              TREND_4H=$(echo "$RESULT" | jq -r '.analysis.trend_4h')

              {
                echo ""
                echo "## ${TIMESTAMP} UTC - ${SYMBOL} ${ACTION}"
                echo ""
                echo "| Item | Value |"
                echo "|------|-------|"
                echo "| Symbol | ${SYMBOL} |"
                echo "| Action | ${ACTION} |"
                echo "| Amount | ${AMOUNT} |"
                echo "| Entry Price | ${ENTRY_PRICE} |"
                echo "| Stop Loss | ${SL} |"
                echo "| Take Profit | ${TP} |"
                echo ""
                echo "### Analysis"
                echo ""
                echo "| Indicator | Value |"
                echo "|-----------|-------|"
                echo "| RSI | ${RSI} |"
                echo "| Rule Signal | ${RULE_SIGNAL} |"
                echo "| Trend (1h) | ${TREND_1H} |"
                echo "| Trend (4h) | ${TREND_4H} |"
                echo "| AI Confidence | ${AI_CONFIDENCE}% |"
                echo ""
                echo "### AI Summary"
                echo ""
                echo "${AI_SUMMARY}"
                echo ""
                echo "---"
              } >> "$MD_FILE"

              ENTRIES_ADDED=$((ENTRIES_ADDED + 1))
            fi
          done

          if [ $ENTRIES_ADDED -eq 0 ]; then
            echo "No entries to commit"
            exit 0
          fi

          echo "Added $ENTRIES_ADDED entries"

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "log: $ENTRIES_ADDED entries at $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
